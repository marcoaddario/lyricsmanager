name: Build and Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for Docker images'
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    env:
      GHCR: ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # FRONTEND IMAGE
      - name: Build frontend image
        run: |
          docker build -t ${{ env.GHCR }}/marcoaddario/lyricsmanager-frontend:${{ inputs.version }} ./frontend

      - name: Push frontend image
        run: |
          docker push ${{ env.GHCR }}/marcoaddario/lyricsmanager-frontend:${{ inputs.version }}

      # BACKEND IMAGE
      - name: Build backend image
        run: |
          docker build -t ${{ env.GHCR }}/marcoaddario/lyricsmanager-backend:${{ inputs.version }} ./backend

      - name: Push backend image
        run: |
          docker push ${{ env.GHCR }}/marcoaddario/lyricsmanager-backend:${{ inputs.version }}
